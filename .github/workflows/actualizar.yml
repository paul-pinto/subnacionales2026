name: Actualizar

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: actualizar, preparar y sincronizar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: resultados/primera_vuelta/requirements.txt
      - name: Python
        run: |
          python -m pip install --upgrade pip
          pip install -r resultados/primera_vuelta/requirements.txt
      - name: Actualizar
        run: |
          ./resultados/primera_vuelta/actualizar.py

      - name: Preparar
        run: |
          ./resultados/primera_vuelta/preparar.py
          ./resultados/primera_vuelta/preparar_gobernaciones.py

      - name: Commit
        run: |
          git config --global user.name "actions-bot"
          git config --global user.email "actions-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "Update data" && git push)
